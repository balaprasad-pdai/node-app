apiVersion: v1
kind: Secret
metadata:
  name: node-app-secrets
  namespace: node-app
type: Opaque
stringData:
  # Put sensitive values here as plain text. Kubernetes will convert to base64 in `data`.
  # Example keys used by the application (adjust names to match your app):
  DATABASE_URL: "postgres://user:password@hostname:5432/dbname"
  JWT_SECRET: "replace-with-a-long-random-secret"
  API_KEY: "replace-with-your-api-key"

# Alternative (safer for CI/CD): create the secret with kubectl from environment variables:
# kubectl create secret generic node-app-secrets \
#   --namespace node-app \
#   --from-literal=DATABASE_URL="$DATABASE_URL" \
#   --from-literal=JWT_SECRET="$JWT_SECRET" \
#   --from-literal=API_KEY="$API_KEY"
